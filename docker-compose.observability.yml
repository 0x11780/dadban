# Optional local stack: Grafana (UI) + Tempo (traces) + Loki (OTel logs) + OTLP collector.
# Usage from repo root:
#   docker compose -f docker-compose.observability.yml up -d
# Then in .env (see .env.example):
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://127.0.0.1:4318
#   OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
# Open Grafana at http://localhost:3001 (anonymous admin enabled for dev only).

services:
  tempo:
    image: grafana/tempo:2.6.1
    container_name: daadnegar_tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/observability/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
    networks:
      - observability

  loki:
    image: grafana/loki:3.3.2
    container_name: daadnegar_loki
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./docker/observability/loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100:3100"
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: daadnegar_otel_collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./docker/observability/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4318:4318"
    depends_on:
      - tempo
      - loki
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.4.0
    container_name: daadnegar_grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_DEFAULT_THEME: system
    volumes:
      - ./docker/observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - tempo
      - loki
    networks:
      - observability

networks:
  observability:
